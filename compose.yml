services:
  the-brain:
    image: ghcr.io/hastur-hp/the-brain:latest
    container_name: the_brain
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8100}:8100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Active engine provider
      # Options: ollama, openai, vllm, lmstudio, llamacpp
      - LLM_ENGINE=${LLM_ENGINE:-lmstudio}

      # Provider URLs (host.docker.internal reaches the Mac host from inside the container)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LM_STUDIO_BASE_URL=${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://localhost:8000/v1}
      - LLAMA_CPP_BASE_URL=${LLAMA_CPP_BASE_URL:-http://localhost:8080/v1}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}

      # API key
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-no-key-required}

      # Models
      - LLM_MODEL=${LLM_MODEL:-gemma-4-26b-a4b-it-mlx}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-qwen3-embedding-0.6b}
      - VISION_MODEL=${VISION_MODEL:-gemma-4-26b-a4b-it-mlx}

      # Reranker config
      - RERANKER_BASE_URL=${RERANKER_BASE_URL:-https://api.cohere.com/v2}
      - RERANKER_MODEL=${RERANKER_MODEL:-rerank-v4.0-fast}
      - RERANKER_API_KEY=${RERANKER_API_KEY:-}

      # Model Settings & Tuning
      - LLM_NUM_CTX=${LLM_NUM_CTX:-32768}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-7200}
      - LLM_MAX_ASYNC=${LLM_MAX_ASYNC:-1}

      - EMBEDDING_DIM=${EMBEDDING_DIM:-1024}
      - MAX_EMBED_TOKENS=${MAX_EMBED_TOKENS:-8192}
      - EMBEDDING_TIMEOUT=${EMBEDDING_TIMEOUT:-300}
      - EMBEDDING_MAX_ASYNC=${EMBEDDING_MAX_ASYNC:-1}

      # Document Chunking
      - CHUNK_SIZE=${CHUNK_SIZE:-600}
      - CHUNK_OVERLAP_SIZE=${CHUNK_OVERLAP_SIZE:-100}

      # Neo4j (service name 'neo4j' resolves inside compose network)
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-raganything}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-raganything}

      # Internal paths (mapped to volume)
      - WORKING_DIR=${WORKING_DIR:-/app/data/rag_storage}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/data/uploads}
      - OUTPUT_DIR=${OUTPUT_DIR:-/app/data/output}
      - PARSER=${PARSER:-mineru}
    volumes:
      - thebrain_data:/app/data
      - thebrain_mineru_models:/root/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy

  # Neo4j
  neo4j:
    image: neo4j:5
    container_name: lightrag_neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-raganything}
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    healthcheck:
      test:
        [
          "CMD",
          "cypher-shell",
          "-u",
          "neo4j",
          "-p",
          "${NEO4J_PASSWORD:-raganything}",
          "RETURN 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
    name: lightrag_neo4j_data
  neo4j_plugins:
    name: lightrag_neo4j_plugins
  thebrain_data:
    name: thebrain_data
  thebrain_mineru_models:
    name: thebrain_mineru_models
